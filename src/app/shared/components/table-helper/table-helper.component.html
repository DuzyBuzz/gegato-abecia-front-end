<div class="card">

  <p-table
    #dt
    [value]="value"
    [(selection)]="selectedRow"
    selectionMode="single"
    (onRowSelect)="onRowSelect($event)"
    dataKey="id"
    [rowHover]="showRowHover"
    [rows]="rows"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [paginator]="true"
    [loading]="loading"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [globalFilterFields]="globalFilterFields"
  >

    <!-- CAPTION -->
    <ng-template pTemplate="caption" *ngIf="showGlobalFilter">

      <div class="flex justify-between items-center gap-4 w-full flex-wrap">

        <p-iconField iconPosition="left" class="flex-grow">

          <p-inputIcon>
            <i class="pi pi-search"></i>
          </p-inputIcon>

          <input
            pInputText
            type="text"
            [(ngModel)]="searchValue"
            (input)="onSearchInput($event.target.value)"
            placeholder="Search..."
            class="w-full"
          />

        </p-iconField>

        <div class="flex gap-2">

          <p-button
            *ngIf="showClearButton"
            severity="danger"
            [outlined]="true"
            icon="pi pi-filter-slash"
            label="Clear"
            (click)="clear()"
          ></p-button>

          <p-button
            *ngIf="showPrintButton"
            [outlined]="true"
            icon="pi pi-print"
            label="Print"
            severity="info"
            (click)="printTable()"
          ></p-button>

          <p-button
            *ngIf="showExportButton"
            [outlined]="true"
            icon="pi pi-download"
            label="Export Excel"
            severity="success"
            (click)="exportToExcel()"
          ></p-button>

        </div>

      </div>

    </ng-template>


    <!-- HEADER -->
    <ng-template pTemplate="header">

      <tr>

        <th
          *ngFor="let col of columns"
          [style.minWidth]="col.width || '14rem'"
          [pSortableColumn]="col.sortable ? col.field : undefined"
        >

          <div class="flex justify-between items-center gap-2">

            <span>{{ col.header }}</span>

            <p-sortIcon
              *ngIf="col.sortable"
              [field]="col.field"
            ></p-sortIcon>

            <p-columnFilter
              *ngIf="col.filterable"
              [field]="col.field"
              [type]="col.filterType || 'text'"
              display="menu"
              class="ml-auto"
            ></p-columnFilter>

          </div>

        </th>

      </tr>

    </ng-template>


    <!-- BODY -->
    <ng-template pTemplate="body" let-row>

      <tr
        [pSelectableRow]="row"
        class="p-selectable-row"
        (dblclick)="onRowClick(row)"
        style="cursor:pointer"
      >

        <td *ngFor="let col of columns">

          <ng-container [ngSwitch]="col.template">

            <span *ngSwitchDefault>
              {{ row[col.field] }}
            </span>

            <span *ngSwitchCase="'date'">
              {{ row[col.field] | date:'MM/dd/yyyy' }}
            </span>

            <span *ngSwitchCase="'currency'">
              {{ row[col.field] | currency:'USD':'symbol' }}
            </span>

            <p-tag
              *ngSwitchCase="'status'"
              [value]="row[col.field]"
              severity="info"
            ></p-tag>

            <p-progressBar
              *ngSwitchCase="'progress'"
              [value]="row[col.field]"
              [showValue]="false"
            ></p-progressBar>

            <p-tag
              *ngSwitchCase="'tag'"
              [value]="row[col.field]"
            ></p-tag>

          </ng-container>

        </td>

      </tr>

    </ng-template>


    <!-- EMPTY -->
    <ng-template pTemplate="emptymessage">

      <tr>
        <td [attr.colspan]="columns.length" class="text-center py-4">
          No records found
        </td>
      </tr>

    </ng-template>

  </p-table>

</div>
