<div class="deceased-table-container">

  <app-table-helper
    [value]="deceasedList"
    [columns]="columns"
    [loading]="loading"
    [rows]="50"
    [rowsPerPageOptions]="[10,20,50]"
    [showRowHover]="true"
    [dataKey]="'id'"
    [globalFilterFields]="['firstName','middleName','lastName']"
    [showGlobalFilter]="true"
    [showClearButton]="true"
    [showPrintButton]="true"
    [showExportButton]="true"
    [exportFileName]="'funeral-contracts'"
    [printTitle]="'Funeral Contracts'"
    (rowSelect)="onRowSelected($event)"
    (onSearch)="onSearch($event)"
  >
  </app-table-helper>

</div>
