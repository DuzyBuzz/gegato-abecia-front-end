<div class="min-h-screen bg-slate-100">

  <!-- ================= TOP HEADER ================= -->
  <header
    class="fixed top-0 left-0 right-0 h-20
           bg-[#3A1247] text-white
           flex items-center justify-between
           px-6 z-50
           shadow-md
           border-b border-white/10"
  >
    <!-- LEFT: LOGO + TITLE -->
    <div class="flex items-center gap-3">
      <img
        src="assets/images/gegato-logo.jpg"
        class="w-10 h-10 object-cover rounded"
        alt="Logo"
      />
      <div>
        <h1 class="text-sm font-bold leading-tight">
          Gegato Abecia
        </h1>
        <p class="text-xs text-white/70">
          Funeral Homes & Crematory Services
        </p>
      </div>
    </div>

    <!-- RIGHT: USER MENU -->
    <div class="relative">
      <button
        (click)="toggleUserMenu()"
        class="flex items-center gap-3 bg-white/10
               px-4 py-2 rounded-lg hover:bg-white/20 transition"
      >
        <div
          class="w-9 h-9 rounded-full bg-purple-700 text-white
                 flex items-center justify-center font-semibold text-sm"
        >
          {{ getUserInitials(currentUser.name) }}
        </div>

        <div class="text-left hidden sm:block">
          <p class="text-sm font-semibold">
            {{ formatUserName(currentUser.name) }}
          </p>
          <p class="text-xs text-white/70">
            {{ currentUser.role }}
          </p>
        </div>
      </button>

      <!-- USER DROPDOWN MENU -->
      <div
        *ngIf="userMenuOpen"
        class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg
               overflow-hidden z-50"
        (click)="closeUserMenu()"
      >
        <div class="px-4 py-3 border-b border-gray-200">
          <p class="text-sm font-semibold text-gray-900">
            {{ currentUser.name }}
          </p>
          <p class="text-xs text-gray-600">
            {{ currentUser.role }}
          </p>
        </div>

        <div class="py-2">
          <button
            (click)="openSettings()"
            class="w-full text-left px-4 py-2 text-sm text-gray-700
                   hover:bg-gray-100 flex items-center gap-3 transition"
          >
            <span class="material-icons text-base">settings</span>
            Settings
          </button>

          <button
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-red-600
                   hover:bg-red-50 flex items-center gap-3 transition"
          >
            <span class="material-icons text-base">logout</span>
            Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="pt-20 px-8 py-6">
    <router-outlet></router-outlet>
  </main>

</div>
