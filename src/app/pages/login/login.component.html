<!-- GLOBAL LOADING OVERLAY -->
<div *ngIf="loading" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
  <p-progressSpinner></p-progressSpinner>
</div>
<div class="login-container min-h-screen bg-gradient-to-br from-purple-900 via-purple-800 to-purple-700 flex items-center justify-center px-4 py-12">



  <div class="w-full max-w-md">
    <!-- Main Login Card -->
    <p-card class="shadow-2xl" [style]="{ 'border-radius': '1rem' }">
      <ng-template pTemplate="header">
        <div class="bg-gradient-to-r from-purple-700 to-purple-900 p-8 flex justify-center rounded-t-2xl">
          <img 
            src="assets/images/gegato-logo.jpg" 
            alt="Gegato Logo" 
            class="w-24 h-24 rounded-full shadow-lg border-4 border-white"
          >
        </div>
      </ng-template>

      <!-- Card Content -->
      <div class="p-8">
        <!-- Heading -->
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">Welcome Back</h1>

        <!-- Error Message -->
        <p-message 
          *ngIf="errorMessage" 
          severity="error" 
          [text]="errorMessage"
          [styleClass]="'w-full mb-6'"
        ></p-message>

        <!-- Login Form -->
        <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

          <!-- Username Field -->
          <div class="field">
            <p-floatlabel>
              <input 
                pInputText 
                id="username"
                type="text"
                formControlName="username"
                class="w-full"
                [class.ng-invalid.ng-touched]="form.get('username')?.invalid && form.get('username')?.touched"
              />
              <label for="username" class="font-semibold">Username</label>
            </p-floatlabel>
            <small 
              *ngIf="form.get('username')?.invalid && form.get('username')?.touched" 
              class="text-red-600 block mt-1"
            >
              Username is required
            </small>
          </div>

          <!-- Password Field -->
          <div class="field ">
            <p-floatlabel>
              <p-password
                id="password"
                formControlName="password"
                [feedback]="false"
                [toggleMask]="true"
                iconDisplay="focus"
                class="w-full"
                [styleClass]="'w-full'"
              ></p-password>
              <label for="password" class="font-semibold">Password</label>
            </p-floatlabel>
            <small 
              *ngIf="form.get('password')?.invalid && form.get('password')?.touched" 
              class="text-red-600 block mt-1"
            >
              Password is required
            </small>
          </div>
<br>
          <!-- Submit Button -->
<p-button
  type="submit"
  label="Sign In"
  icon="pi pi-sign-in"
  class="w-full mt-10"
  [loading]="loading"
  [disabled]="loading"
  [styleClass]="'p-button-lg w-full'"
></p-button>

        </form>

        <!-- Footer Note -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
          <p class="text-sm text-gray-600">
            <span class="font-semibold text-purple-700">Gegato-Abecia</span> Funeral Management System <br>
            <span>© 2026. All Rights Reserved.</span>
          </p>
        </div>
      </div>
    </p-card>

    <!-- Security Note -->
    <div class="mt-6 text-center text-white text-sm">
      <p class="flex items-center justify-center gap-2">
        <i class="pi pi-download text-lg"></i>
        <span class="hidden sm:inline">Download Desktop App</span>

      </p>
    </div>
  </div>

</div>
