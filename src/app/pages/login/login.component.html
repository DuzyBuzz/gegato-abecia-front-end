<div class="relative min-h-screen flex flex-col md:flex-row items-center justify-center md:justify-between bg-[#3B1546] px-4 sm:px-8 md:px-16 gap-8 md:gap-12">

  <!-- Left side: Logo (hidden on mobile/tablet) -->
  <div class="hidden md:flex md:flex-1 items-center justify-center">
    <div class="w-96 h-96 lg:w-[900px] lg:h-[900px] flex items-center justify-center">
      <img src="assets/images/gegato-logo.jpg" alt="Gegato Logo" class="w-full h-full object-cover rounded-2xl">
    </div>
  </div>

<!-- Right side: Login card (slightly smaller width) -->
<div class="w-full max-w-sm sm:max-w-md md:max-w-xl lg:max-w-2xl bg-white rounded-xl sm:rounded-2xl p-10 sm:p-16 md:p-20 lg:p-24 flex flex-col items-center">
  
  <!-- Logo above heading (mobile only) -->
  <div class="md:hidden w-32 h-32 sm:w-40 sm:h-40 mb-6 sm:mb-8">
    <img src="assets/images/gegato-logo.jpg" alt="Gegato Logo" class="w-full h-full object-cover rounded-full border-2 border-purple-600">
  </div>

  <!-- Heading (responsive text size) -->
  <h1 class="text-center text-gray-800 mb-6 sm:mb-8 text-2xl sm:text-3xl md:text-4xl font-bold">Login</h1>

  <!-- Error message -->
  <div *ngIf="errorMessage" class="bg-red-100 text-red-800 px-3 sm:px-4 py-2 sm:py-3 rounded-lg mb-4 sm:mb-6 text-xs sm:text-sm border-l-4 border-red-800 w-full">
  </div>

  <!-- Role Selection Section
  <div class="w-full mb-8 sm:mb-10">
    <label class="block mb-4 text-gray-700 font-semibold text-sm sm:text-base">Select Your Role:</label>
    <div class="grid grid-cols-2 gap-3 sm:gap-4">
      <button *ngFor="let role of roles"
              type="button"
              (click)="selectRole(role.value)"
              [class.ring-2]="selectedRole === role.value"
              [class.ring-purple-600]="selectedRole === role.value"
              [class.bg-purple-50]="selectedRole === role.value"
              class="p-3 sm:p-4 border-2 border-gray-200 rounded-lg transition-all text-left hover:border-purple-400 focus:outline-none text-xs sm:text-sm"
              [class.border-purple-600]="selectedRole === role.value">
        <div class="font-semibold text-gray-800">{{ role.label }}</div>

      </button>
    </div>
  </div> -->

  <!-- Login form -->
<form class="w-full" (ngSubmit)="submit()" [formGroup]="form">

  <!-- ERROR -->
  <div *ngIf="errorMessage"
       class="bg-red-100 text-red-800 px-4 py-3 rounded mb-4">
    {{ errorMessage }}
  </div>

  <!-- USERNAME -->
  <input
    type="text"
    formControlName="username"
    placeholder="Username"
    class="w-full px-4 py-3 border rounded"
  />

  <!-- PASSWORD -->
  <input
    type="password"
    formControlName="password"
    placeholder="Password"
    class="w-full px-4 py-3 border rounded mt-4"
  />

  <!-- SUBMIT -->
  <button
    type="submit"
    class="w-full mt-6 py-3 bg-purple-800 text-white rounded"
  >
    Login
  </button>

</form>

<button
    type="button" routerLink="/admin"
    class="mt-6 text-purple-600 hover:underline text-sm sm:text-base"
  >
    Don't have an account? Register here.
  </button>
<a href="/downloads/MyAppSetup.exe" download>
  Download Desktop App
</a>

</div>

</div>
