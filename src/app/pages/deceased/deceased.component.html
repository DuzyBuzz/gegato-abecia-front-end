<p-toolbar class="mb-4">
  <!-- LEFT -->
  <ng-template #start>
    <h2 class="text-3xl font-bold text-gray-700">
      Deceased List
    </h2>
  </ng-template>

  <!-- RIGHT -->
  <ng-template #end>
    <p-button
      label="Funeral Contract"
      icon="pi pi-user-plus"
      severity="success"
      (onClick)="openNewFuneralContract()"
    ></p-button>
  </ng-template>
</p-toolbar>

<app-deceased-table></app-deceased-table>
<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '99vw' }"
  [maximizable]="true"
  [closable]="true"
  [draggable]="true"
  [resizable]="true"
>

  <ng-template pTemplate="header">
    <div class="flex items-center justify-between w-full   text-black px-5 py-4 rounded-t">

      <!-- Left -->
      <div class="flex flex-col">
        <span class="text-2xl font-bold">
          Funeral Service Contract
        </span>
        <span class="text-sm text-gray-300">
          Complete all required fields to proceed
        </span>
      </div>



    </div>
  </ng-template>

  <app-funeral-contract-entry></app-funeral-contract-entry>

</p-dialog>
