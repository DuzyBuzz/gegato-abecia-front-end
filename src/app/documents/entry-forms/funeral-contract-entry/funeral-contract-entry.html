<form [formGroup]="form">
  <div class="p-4 sm:p-6 lg:p-8">
  
  <!-- Navigation & Actions -->
  <div class="flex items-center justify-between mb-6">

    <h1 class="text-center flex-1 text-5xl mx-4">
      FUNERAL SERVICE CONTRACT
    </h1>

  </div>

    <h2 class="text-left  text-4xl font-bold mb-6 mt-6">
       {{ fullName }}
  </h2>

    <!-- ========== CONTRACT HEADER SECTION ========== -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2 border-b pb-2 pt-3 sm:pt-4 text-xs sm:text-sm">
      <div>
        <label class="block font-medium text-xs sm:text-sm">Contract Date</label>
        <input type="date" formControlName="contractDate" class="border w-full px-2 py-1 text-xs sm:text-sm">
      </div>
      <div>
        <label class="block font-medium text-xs sm:text-sm">Contract No.</label>
        <input formControlName="contractNo" class="border w-full px-2 py-1 text-xs sm:text-sm">
      </div>
      <div>
        <label class="block font-medium text-xs sm:text-sm">Type of Service</label>
        <app-select-helper formControlName="typeOfService" comboboxName="typeOfService"></app-select-helper>
      </div>
      <div>
        <label class="block font-medium text-xs sm:text-sm">Type of Cremation</label>
        <app-select-helper formControlName="typeOfCremation" comboboxName="typeOfCremation"></app-select-helper>
      </div>
      <div>
        <label class="block font-medium text-xs sm:text-sm">Financial Assistance</label>
        <app-select-helper formControlName="financialAssistance" comboboxName="financialAssistance"></app-select-helper>
      </div>
    </div>

    <!-- ========== MAIN 3 COLUMN LAYOUT ========== -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 sm:gap-3 md:gap-4 mt-3 sm:mt-4">

      <!-- LEFT COLUMN -->
      <div>
        <fieldset class="border p-2 sm:p-3">
          <legend class="text-xs sm:text-sm font-bold">Information of the Deceased</legend>

          <!-- Date Retrieved & Informant -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Date Retrieved</label>
              <input type="date" formControlName="dateRetrieved" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>

            <div>
              <label class="block font-medium text-xs sm:text-sm">Informant</label>
              <input type="text" formControlName="informant" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <!-- First Name + Suffix (Flexible Layout) -->
          <div>
            <label class="block font-medium text-xs sm:text-sm">First Name</label>
            <input type="text" formControlName="firstName" class="border w-full px-2 py-1 text-xs sm:text-sm mb-2">
          </div>
          <div>
            <label class="block font-medium text-xs sm:text-sm">Middle Name</label>
            <input type="text" formControlName="middleName" class="border w-full px-2 py-1 text-xs sm:text-sm mb-2">
          </div>

          <div>
            <label class="block font-medium text-xs sm:text-sm">Last Name</label>
            <input type="text" formControlName="lastName" class="border w-full px-2 py-1 text-xs sm:text-sm mb-2">
          </div>

          <!-- Personal Information (2 Columns, 2 Rows) -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">

            <!-- ROW 1 -->
            <div >
              <label class="block text-xs sm:text-sm font-medium">Date of Birth</label>
              <input type="date" formControlName="dateOfBirth" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>

            <div>
              <label class="block text-xs sm:text-sm font-medium">Age</label>
              <input type="number" formControlName="age" class="border w-full px-2 py-1 text-xs sm:text-sm" min="0">
            </div>

            <!-- ROW 2 -->
            <div>
              <label class="block text-xs sm:text-sm font-medium">Sex</label>
              <app-select-helper formControlName="sex" comboboxName="sex"></app-select-helper>
            </div>

            <div>
              <label class="block text-xs sm:text-sm font-medium">Civil Status</label>
              <app-select-helper formControlName="civilStatus" comboboxName="civilStatus"></app-select-helper>
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Date of Death</label>
          <input type="date" formControlName="dateOfDeath" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Address of Deceased</label>
          <input formControlName="addressOfDeceased" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Place of Death</label>
          <input formControlName="placeOfDeath" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">
        </fieldset>

        <fieldset class="border p-2 sm:p-3 mt-3 sm:mt-4">
          <legend class="text-xs sm:text-sm font-bold">Information of the Contractee</legend>

          <!-- First Name + Suffix (Flexible Layout) -->
          <div class="grid grid-cols-[1fr,80px] sm:grid-cols-[1fr,90px] gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Contractee</label>
              <input type="text" formControlName="contracteeName" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>

            <div>
              <label class="block font-medium text-xs sm:text-sm">Age</label>
              <input type="number" formControlName="contracteeAge" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Occupation</label>
          <input formControlName="occupation" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Address 1</label>
          <input formControlName="address" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Barangay</label>
          <input formControlName="barangay" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">District</label>
          <input formControlName="district" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">City/Municipality</label>
          <input formControlName="city" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Relationship</label>
          <input formControlName="relationship" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Contact No</label>
          <input formControlName="contactNo" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Email Address</label>
          <input type="email" formControlName="email" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Plan</label>
              <input formControlName="plan" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">No.</label>
              <input formControlName="planNo" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Referred by</label>
          <input formControlName="referredBy" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">
        </fieldset>
      </div>

      <!-- MIDDLE COLUMN -->
      <div class="space-y-3 sm:space-y-4">

        <fieldset class="border p-2 sm:p-3">
          <legend class="font-bold text-xs sm:text-sm">Casket / Urn Information</legend>

          <div class="border p-2 bg-yellow-100 rounded mb-2">
            <legend class="text-xs sm:text-sm font-semibold mb-1">Contract Price</legend>

            <div class="flex items-center gap-2">
              <span class="text-lg sm:text-xl">₱</span>
              <input formControlName="contractPrice" class="border w-full px-2 py-1 text-xs sm:text-sm" type="number" value="0.00">
            </div>
          </div>

          <div class="grid grid-cols-1 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Casket</label>
              <app-select-helper formControlName="casketType" comboboxName="casketType"></app-select-helper>
            </div>
            <label class="block font-medium text-xs sm:text-sm">Description</label>
            <textarea formControlName="casketDescription" class="border w-full h-10 px-2 py-1 text-xs sm:text-sm"></textarea>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Urn Type</label>
              <app-select-helper formControlName="urnType" comboboxName="urnType"></app-select-helper>
            </div>
          </div>
          <label class="block font-medium text-xs sm:text-sm">Description</label>
          <textarea formControlName="urnDescription" class="border w-full h-10 px-2 py-1 text-xs sm:text-sm mb-2"></textarea>

          <label class="block font-medium text-xs sm:text-sm">Casket other details</label>
          <textarea formControlName="casketOtherDetails" class="border w-full h-10 px-2 py-1 text-xs sm:text-sm"></textarea>
        </fieldset>

        <fieldset class="border p-2 sm:p-3">
          <legend class="font-bold text-xs sm:text-sm">Delivery Information</legend>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Date</label>
              <input type="date" formControlName="deliveryDate" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Time</label>
              <input type="time" formControlName="deliveryTime" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Location</label>
          <input formControlName="deliveryLocation" class="border w-full px-2 py-1 mb-2 text-xs sm:text-sm">

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Driver</label>
              <input formControlName="deliveryDriver" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Helper</label>
              <input formControlName="deliveryHelper" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Vehicle</label>
              <input formControlName="deliveryVehicle" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>
        </fieldset>

        <fieldset class="border p-2 sm:p-3">
          <legend class="font-bold text-xs sm:text-sm">Transfer Information</legend>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Date</label>
              <input type="date" formControlName="transferDate" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Time</label>
              <input type="time" formControlName="transferTime" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Location</label>
          <input formControlName="transferLocation" class="border w-full px-2 py-1 mb-2 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Deliveries / Transfer Notes</label>
          <textarea formControlName="transferNotes" class="border w-full h-16 px-2 py-1 text-xs sm:text-sm"></textarea>
        </fieldset>

        <fieldset class="border p-2 sm:p-3">
          <legend class="font-bold text-xs sm:text-sm">Burial / Cremation Schedule</legend>

          <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Burial</label>
              <input type="date" formControlName="burialDate" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Take Off</label>
              <input type="time" formControlName="takeOffTime" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Mass</label>
              <input type="time" formControlName="massTime" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Holding Area</label>
              <app-select-helper formControlName="holdingArea" comboboxName="holdingArea"></app-select-helper>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Cremation</label>
              <input type="date" formControlName="cremationDate" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Time</label>
              <input type="time" formControlName="cremationTime" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>

          <label class="block font-medium text-xs sm:text-sm">Church</label>
          <input formControlName="church" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Cemetery</label>
          <input formControlName="cemetery" class="border w-full mb-2 px-2 py-1 text-xs sm:text-sm">

          <label class="block font-medium text-xs sm:text-sm">Burial Notes</label>
          <textarea formControlName="burialNotes" class="border w-full h-16 px-2 py-1 text-xs sm:text-sm mb-2"></textarea>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-2">
            <div>
              <label class="block font-medium text-xs sm:text-sm">Driver</label>
              <input formControlName="burialDriver" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Helper</label>
              <input formControlName="burialHelper" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Vehicle</label>
              <input formControlName="burialVehicle" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>
        </fieldset>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-3 sm:space-y-4">
        <label class="block font-medium text-xs sm:text-sm">Contract Remarks</label>
        <textarea formControlName="contractRemarks" class="border w-full h-20 sm:h-40 px-2 py-1 text-xs sm:text-sm"></textarea>

        <label class="block font-medium text-xs sm:text-sm">Operations Remarks</label>
        <textarea formControlName="operationsRemarks" class="border w-full h-20 sm:h-40 px-2 py-1 text-xs sm:text-sm"></textarea>

        <label class="block font-medium text-xs sm:text-sm">Morgue Remarks</label>
        <textarea formControlName="morgueRemarks" class="border w-full h-20 sm:h-40 px-2 py-1 text-xs sm:text-sm"></textarea>



          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-2">
            <!-- <div>
              <label class="block font-medium text-xs sm:text-sm">Date Retrieved</label>
              <input type="date" formControlName="dateRetrieved" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Ret. Driver</label>
              <input type="text" formControlName="transferDriver" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div> -->
            <div>
              <label class="block font-medium text-xs sm:text-sm">Caller</label>
              <input type="text" formControlName="transferCaller" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Ret. Helper</label>
              <input type="text" formControlName="transferHelper" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Checked By</label>
              <input type="text" formControlName="transferCheckedBy" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
            <div>
              <label class="block font-medium text-xs sm:text-sm">Embalmed By</label>
              <input type="text" formControlName="transferEmbalmedBy" class="border w-full px-2 py-1 text-xs sm:text-sm">
            </div>
          </div>
                  <div class="flex flex-col gap-2 pt-2">
          <button class="bg-blue-600 text-white py-2 rounded text-xs sm:text-sm font-medium">Submit Contract</button>
          <button 
            type="button"
            (click)="goToBilling()"
            class="bg-blue-400 text-white py-2 rounded text-xs sm:text-sm font-medium hover:bg-blue-500">
            Billing Record
          </button>
        </div>
      </div>

    </div><!-- END 3 COLUMNS -->

</div>
</form>
