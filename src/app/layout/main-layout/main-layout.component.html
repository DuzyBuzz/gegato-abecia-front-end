<div class="min-h-screen bg-slate-100">

  <!-- ================= TOP HEADER ================= -->
<header
  class="fixed top-0 left-0 right-0 h-20
         bg-[#3A1247] text-white
         flex items-center justify-between
         px-6 z-50

         shadow-md
         border-b border-white/10"
>

    <!-- LEFT: LOGO + TITLE -->
    <div class="flex items-center gap-3">
      <img
        src="assets/images/gegato-logo.jpg"
        class="w-10 h-10 object-cover rounded"
        alt="Logo"
      />
      <div>
        <h1 class="text-sm font-bold leading-tight">
          Gegato Abecia
        </h1>
        <p class="text-xs text-white/70">
          Funeral Homes & Crematory Services

        </p>
      </div>
    </div>

    <!-- RIGHT: USER -->
    <button
      class="flex items-center gap-3 bg-white/10
             px-4 py-2 rounded-lg hover:bg-white/20 transition"
    >
      <div
        class="w-9 h-9 rounded-full bg-purple-700 text-white
               flex items-center justify-center font-semibold text-sm"
      >
        {{ getUserInitials(currentUser.name) }}
      </div>

      <div class="text-left hidden sm:block">
        <p class="text-sm font-semibold">
          {{ formatUserName(currentUser.name) }}
        </p>
        <p class="text-xs text-white/70">
          {{ currentUser.role }}
        </p>
      </div>
    </button>
  </header>

  <!-- ================= SIDEBAR ================= -->
 <aside
  class="fixed top-20 left-0
         h-[calc(100vh-5rem)]
         bg-[#35103F]
         text-white
         flex flex-col
         transition-all duration-300
         z-40

         shadow-[inset_0_1px_0_rgba(255,255,255,0.08)]"
  [class.w-64]="sidebarExpanded"
  [class.w-20]="!sidebarExpanded"
>


    <!-- NAV -->
    <nav class="flex-1 px-3 py-6 space-y-1 text-sm">

      <a routerLink="/dashboard" class="sidebar-item">
        <span class="material-icons">dashboard</span>
        <span *ngIf="sidebarExpanded">Dashboard</span>
      </a>

      <a routerLink="/admin/users" class="sidebar-item">
        <span class="material-icons">people</span>
        <span *ngIf="sidebarExpanded">Users</span>
      </a>

      <!-- CONTRACTS -->
      <button
        (click)="toggle('contracts')"
        class="sidebar-item w-full justify-between"
        [disabled]="!sidebarExpanded"
      >
        <div class="flex items-center gap-3">
          <span class="material-icons">description</span>
          <span *ngIf="sidebarExpanded">Deceased</span>
        </div>
        <span
          *ngIf="sidebarExpanded"
          class="material-icons transition-transform"
          [class.rotate-180]="isOpen('contracts')"
        >
          expand_more
        </span>
      </button>

      <div
        *ngIf="sidebarExpanded && isOpen('contracts')"
        class="ml-9 mt-1 space-y-1"
      >
        <a
          routerLink="/user/entry-forms/funeral-service-contract"
          class="sidebar-child"
        >
          New Contract
        </a>
        <a
          routerLink="/user/client-record"
          class="sidebar-child"
        >
          Contract Records
        </a>
      </div>

      <!-- INVENTORY -->
      <button
        (click)="toggle('inventory')"
        class="sidebar-item w-full justify-between"
        [disabled]="!sidebarExpanded"
      >
        <div class="flex items-center gap-3">
          <span class="material-icons">inventory_2</span>
          <span *ngIf="sidebarExpanded">Inventory</span>
        </div>
        <span
          *ngIf="sidebarExpanded"
          class="material-icons transition-transform"
          [class.rotate-180]="isOpen('inventory')"
        >
          expand_more
        </span>
      </button>

      <div
        *ngIf="sidebarExpanded && isOpen('inventory')"
        class="ml-9 mt-1 space-y-1"
      >
        <a routerLink="/user/entry-forms/items-entry" class="sidebar-child">
          Create Item
        </a>
        <a routerLink="/user/inventory" class="sidebar-child">
          Item List
        </a>
        <a class="sidebar-child">Stock In</a>
        <a class="sidebar-child">Stock Movement</a>
      </div>

      <a class="sidebar-item">
        <span class="material-icons">bar_chart</span>
        <span *ngIf="sidebarExpanded">Reports</span>
      </a>

    </nav>

    <!-- FOOTER -->
    <div class="p-4 border-t border-white/10">
      <button class="w-full sidebar-item">
        <span class="material-icons text-sm">settings</span>
        <span *ngIf="sidebarExpanded">Settings</span>
      </button>

      <button
        (click)="logout()"
        class="w-full sidebar-item text-red-500 hover:text-red-200"
      >
        <span class="material-icons text-sm text-red-500">logout</span>
        <span *ngIf="sidebarExpanded">Logout</span>
      </button>
    </div>

    <!-- ===== CENTER FLOATING TOGGLE ===== -->
 <button
  (click)="toggleSidebar()"
  class="absolute top-1/2 -right-3 -translate-y-1/2
         w-6 h-12
         bg-[#5A2A6E] text-white
         rounded-r-lg
         flex items-center justify-center
         hover:bg-[#6B3A82]
         transition-all duration-200

         shadow-[-4px_0_8px_rgba(0,0,0,0.35)]
         hover:shadow-[-6px_0_12px_rgba(0,0,0,0.45)]

         before:content-['']
         before:absolute
         before:inset-0
         before:rounded-r-lg
         before:shadow-[inset_1px_0_0_rgba(255,255,255,0.25)]
         "
>
  <span class="material-icons text-base">
    {{ sidebarExpanded ? 'chevron_left' : 'chevron_right' }}
  </span>
</button>



  </aside>

  <!-- ================= MAIN CONTENT ================= -->
  <main
    class="pt-20 px-8 py-6 transition-all duration-300"
    [class.ml-64]="sidebarExpanded"
    [class.ml-20]="!sidebarExpanded"
  >
    <router-outlet></router-outlet>
  </main>

</div>
